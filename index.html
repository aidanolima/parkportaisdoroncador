<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Portais do Roncador | Em Breve</title>
  <meta name="description" content="Site em construção. Em breve novas experiências de aventura, bem-estar e misticismo no coração da natureza." />
  
  <link rel="icon" type="image/x-icon" href="assets/hero/logo.ico" />
  <link rel="shortcut icon" href="assets/hero/logo.ico" />
  
  <meta property="og:title" content="Park Portais Roncador | Em Breve" />
  <meta property="og:description" content="Site em construção. Aguarde nossas novidades." />
  <meta property="og:image" content="assets/hero/logo.png" />
  <meta property="og:url" content="https://parkportaisroncador.com" />
  <meta property="og:type" content="website" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Estilos Exclusivos para a Landing Page de "Em Breve" */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh; /* Trava a altura para 100% da tela */
      overflow: hidden; /* Remove a barra de rolagem */
      background-color: #050505;
    }

    /* Centralização do Header */
    .teaser-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center; /* Centraliza o conteúdo */
      align-items: center;
      padding: 1.2rem 0;
      background: rgba(5, 5, 5, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
      z-index: 100;
    }

    .teaser-header .brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      font-family: "Cinzel Decorative", serif;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .teaser-header .logo-container {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: 2px solid rgba(201, 168, 76, 0.95);
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .teaser-header .brand-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .teaser-header .brand-text {
      font-size: 0.95rem;
      color: #c9a84c;
      font-weight: 600;
    }

    /* Layout Principal (Duas Colunas) */
    .teaser-main {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teaser-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/hero/hero1.jpg'); /* Altere se preferir outra imagem de fundo */
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
      z-index: 1;
    }

    .teaser-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
      z-index: 2;
    }

    .teaser-content {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1.1fr 1fr; /* Damos mais espaço para a coluna do logo */
      gap: 3rem; /* Reduzi levemente o espaço entre as colunas */
      width: 100%;
      max-width: 1300px; /* Área total um pouco mais larga */
      padding: 0 2rem;
      margin-top: 60px; 
      align-items: center;
    }

    /* Coluna Esquerda: Logo Gigante */
    .teaser-logo-box {
      display: flex;
      justify-content: flex-end;
    }

    .teaser-logo-box img {
      width: 100%;
      max-width: 600px; /* Aumentado para dar o destaque merecido! */
      height: auto;
      filter: drop-shadow(0 0 35px rgba(201, 168, 76, 0.25));
      animation: floatLogo 6s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Coluna Direita: Textos */
    .teaser-text-box {
      text-align: left;
    }

    .teaser-text-box .hero-tag {
      color: #c9a84c;
      letter-spacing: 0.24em;
      font-family: "Cinzel Decorative", serif;
      text-transform: uppercase;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .teaser-text-box .hero-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(3rem, 5vw, 4.5rem);
      line-height: 1.1;
      font-weight: 900;
      color: #fff;
      text-shadow: 1px 1px 15px rgba(0, 0, 0, 0.8);
      margin: 0 0 1.2rem 0;
    }

    .teaser-text-box .hero-sub {
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      color: #d4c5a9;
      font-weight: 500;
      margin-bottom: 2.5rem;
    }

    /* Ajuste de Alinhamento e Fonte do Badge */
    .teaser-badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.7rem 2.5rem; /* Reduz padding vertical de 1rem para 0.7rem para garantir uma linha */
      border: 1px solid rgba(201, 168, 76, 0.4);
      background: rgba(10, 10, 10, 0.65);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      
      /* Estilos de Texto e Fonte */
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.95rem;
      font-weight: 600; /* Re-add bold weight from original strong tag */
      white-space: nowrap; /* FORÇA O TEXTO EM UMA ÚNICA LINHA */
    }

    /* Responsividade para telas menores */
    @media (max-width: 960px) {
      .teaser-content {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 2rem;
        margin-top: 80px;
      }
      .teaser-logo-box {
        justify-content: center;
      }
      .teaser-logo-box img {
        max-width: 300px;
      }
      .teaser-text-box {
        text-align: center;
      }
      /* Em telas pequenas, permitimos rolagem caso a tela seja muito baixa */
      html, body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto; 
      }
      .teaser-main {
        padding: 6rem 0 3rem 0;
      }
      
      /* Re-alinha o badge no mobile */
      .teaser-badge {
          white-space: normal; /* Permite quebrar linha em telas muito pequenas */
          padding: 1rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <header class="teaser-header">
    <a href="#" class="brand">
      <div class="logo-container">
        <img class="brand-logo" src="assets/hero/logo.png" alt="Logo Park Portais Roncador" />
      </div>
      <span class="brand-text">Park Portais Roncador</span>
    </a>
  </header>

  <main class="teaser-main">
    <div class="teaser-bg"></div>
    <div class="teaser-overlay"></div>

    <div class="teaser-content">
      
      <div class="teaser-logo-box">
        <img src="assets/hero/logo.png" alt="Logotipo Completo Park Portais do Roncador" />
      </div>

      <div class="teaser-text-box">
        <div class="hero-tag">Bem-vindo ao coração do</div>
        <h1 class="hero-title">Park Portais<br>Roncador</h1>
        <p class="hero-sub">Onde a natureza selvagem encontra a mística e as belezas da Serra do Roncador</p>
        
        <div class="teaser-badge">
          ✨ Site em construção. Em breve novas experiências! ✨
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
