<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Portais do Roncador | Em Breve</title>
  <meta name="description" content="Site em construção. Em breve novas experiências de aventura, bem-estar e misticismo no coração da natureza." />
  
  <link rel="icon" type="image/x-icon" href="assets/hero/logo.ico" />
  <link rel="shortcut icon" href="assets/hero/logo.ico" />
  
  <meta property="og:title" content="Park Portais Roncador | Em Breve" />
  <meta property="og:description" content="Site em construção. Aguarde nossas novidades." />
  <meta property="og:image" content="https://parkportaisdoroncador.netlify.app/assets/hero/logo.png" />
  <meta property="og:url" content="https://parkportaisdoroncador.netlify.app/" />
  <meta property="og:type" content="website" />
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Park Portais Roncador | Em Breve" />
  <meta name="twitter:description" content="Site em construção. Aguarde nossas novidades!" />
  <meta name="twitter:image" content="https://parkportaisdoroncador.netlify.app/assets/hero/logo.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Estilos Exclusivos para a Landing Page de "Em Breve" */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #050505;
    }

    /* Centralização do Header */
    .teaser-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem 0;
      background: rgba(5, 5, 5, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
      z-index: 100;
    }

    .teaser-header .brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      font-family: "Cinzel Decorative", serif;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .teaser-header .logo-container {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: 2px solid rgba(201, 168, 76, 0.95);
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .teaser-header .brand-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .teaser-header .brand-text {
      font-size: 0.95rem;
      color: #c9a84c;
      font-weight: 600;
    }

    /* Layout Principal (Duas Colunas) */
    .teaser-main {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teaser-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/hero/hero1.jpg'); /* Imagem inicial */
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
      z-index: 1;
      transition: background-image 1.5s ease-in-out; 
    }

    .teaser-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
      z-index: 2;
    }

    .teaser-content {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 3rem;
      width: 100%;
      max-width: 1300px;
      padding: 0 2rem;
      margin-top: 60px;
      align-items: center;
    }

    /* Coluna Esquerda: Logo Gigante */
    .teaser-logo-box {
      display: flex;
      justify-content: flex-end;
    }

    .teaser-logo-box img {
      width: 100%;
      max-width: 600px;
      height: auto;
      filter: drop-shadow(0 0 35px rgba(201, 168, 76, 0.25));
      animation: floatLogo 6s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Coluna Direita: Textos */
    .teaser-text-box {
      text-align: left;
    }

    .teaser-text-box .hero-tag {
      color: #c9a84c;
      letter-spacing: 0.24em;
      font-family: "Cinzel Decorative", serif;
      text-transform: uppercase;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .teaser-text-box .hero-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(3rem, 5vw, 4.5rem);
      line-height: 1.1;
      font-weight: 900;
      color: #fff;
      text-shadow: 1px 1px 15px rgba(0, 0, 0, 0.8);
      margin: 0 0 1.2rem 0;
    }

    .teaser-text-box .hero-sub {
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      color: #d4c5a9;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    /* Estilo para o link do Instagram */
    .teaser-instagram-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0;
      margin-bottom: 2.5rem;
      color: #d4c5a9;
      font-weight: 500;
      font-size: 1rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .teaser-instagram-link:hover {
      color: #c9a84c;
    }
    .teaser-instagram-link svg {
      fill: currentColor;
      width: 20px;
      height: 20px;
    }

    /* Ajuste de Alinhamento e Fonte do Badge */
    .teaser-badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.7rem 2.5rem;
      border: 1px solid rgba(201, 168, 76, 0.4);
      background: rgba(10, 10, 10, 0.65);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      
      color: #c9a84c;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Responsividade para telas menores */
    @media (max-width: 960px) {
      .teaser-content {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 2rem;
        margin-top: 80px;
      }
      .teaser-logo-box {
        justify-content: center;
      }
      .teaser-logo-box img {
        max-width: 300px;
      }
      .teaser-text-box {
        text-align: center;
      }
      html, body {
        height: auto;
        min-height: 100vh;
        overflow-y: auto; 
      }
      .teaser-main {
        padding: 6rem 0 3rem 0;
      }
      .teaser-badge {
          white-space: normal;
          padding: 1rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <header class="teaser-header">
    <a href="#" class="brand">
      <div class="logo-container">
        <img class="brand-logo" src="assets/hero/logo.png" alt="Logo Park Portais Roncador" />
      </div>
      <span class="brand-text">Park Portais Roncador</span>
    </a>
  </header>

  <main class="teaser-main">
    <div class="teaser-bg" id="dynamicBg"></div>
    <div class="teaser-overlay"></div>

    <div class="teaser-content">
      
      <div class="teaser-logo-box">
        <img src="assets/hero/logo.png" alt="Logotipo Completo Park Portais do Roncador" />
      </div>

      <div class="teaser-text-box">
        <div class="hero-tag">Bem-vindo ao coração do</div>
        <h1 class="hero-title">Park Portais<br>Roncador</h1>
        <p class="hero-sub">Onde a natureza selvagem encontra a mística e a beleza da Serra do Roncador</p>
        
        <a href="https://www.instagram.com/parkportaisdoroncador/" target="_blank" rel="noopener" class="teaser-instagram-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0 3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
            @parkportaisroncador
        </a>

        <div class="teaser-badge">
          ✨ Site em construção. Em breve novas experiências! ✨
        </div>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const bgImages = [
        'assets/hero/hero1.jpg',
        'assets/hero/hero2.jpg',
        'assets/hero/hero3.jpg'
      ];
      
      let currentIndex = 0;
      const bgElement = document.getElementById("dynamicBg");
      
      setInterval(() => {
        currentIndex = (currentIndex + 1) % bgImages.length;
        bgElement.style.backgroundImage = `url('${bgImages[currentIndex]}')`;
      }, 3000); 
    });
  </script>
</body>
</html>
